name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  code-review:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: DeepSeek Code Review
        uses: hustcer/deepseek-review@v1
        with:
          chat-token: ${{ secrets.DEEPSEEK_API_KEY }}
          model: deepseek-chat
          temperature: 0.5
          sys-prompt: |
            You are a senior code reviewer. Review the FULL source code of changed files (not just the diff). For each issue, ALWAYS include the file path where it occurs.

            CHECKLIST:
            1. Unused imports/variables
            2. any type usage - flag ":any" or "as any"
            3. Dead code - variables assigned but never read
            4. Hardcoded strings that should use i18n (t() from next-intl)
            5. Hardcoded locale - e.g. "pl" === "pl" instead of useLocale()
            6. Missing "use client" directive
            7. Accessibility issues - missing aria labels, incorrect roles
            8. Error handling - empty catch blocks, unhandled rejections
            9. Performance - unnecessary re-renders, missing memoization
            10. Type safety - incorrect types, missing null checks, unsafe casts
            11. Code duplication - repeated JSX patterns
            12. Logic errors - incorrect conditions, wrong operators

            Format: **file/path.ts:line** - description. Be concise.
            If nothing important, say: No significant issues found.
          exclude-patterns: |
            pnpm-lock.yaml,package-lock.json,*.lock,*.svg,*.png,*.jpg,*.jpeg,*.toml
