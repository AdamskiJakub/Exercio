name: DeepSeek Code Review

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: files
        run: |
          # Get list of changed files (code only)
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- . \
            ':!*.json' ':!*.md' ':!*.lock' ':!*.toml' \
            ':!*.svg' ':!*.png' ':!*.jpg' ':!*.jpeg' \
            ':!**/node_modules/**' 2>/dev/null || true)

          echo "FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate full file contents for review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          FILES="${{ steps.files.outputs.FILES }}"

          if [ -z "$FILES" ]; then
            echo "✅ No code changes to review." > /tmp/review_comment.txt
            exit 0
          fi

          # Build context: for each changed file, include its FULL content
          CONTEXT=""
          TOTAL_LENGTH=0
          MAX_LENGTH=80000

          while IFS= read -r file; do
            if [ -f "$file" ]; then
              FILE_CONTENT=$(cat "$file")
              FILE_LENGTH=${#FILE_CONTENT}
              
              # Estimate tokens (roughly 4 chars per token)
              EST_TOKENS=$((FILE_LENGTH / 4))
              
              # Skip binary or huge files
              if [ "$FILE_LENGTH" -gt 50000 ]; then
                FILE_CONTENT="${FILE_CONTENT:0:50000}\n\n// ... [truncated, file too large]"
                FILE_LENGTH=50000
              fi
              
              ENTRY="\n\n=== $file ===\n\`\`\`\n$FILE_CONTENT\n\`\`\`"
              ENTRY_LENGTH=${#ENTRY}
              
              if [ $((TOTAL_LENGTH + ENTRY_LENGTH)) -gt $MAX_LENGTH ]; then
                CONTEXT="${CONTEXT}\n\n// ... [remaining files truncated due to context limit]"
                break
              fi
              
              CONTEXT="${CONTEXT}${ENTRY}"
              TOTAL_LENGTH=$((TOTAL_LENGTH + ENTRY_LENGTH))
            fi
          done <<< "$FILES"

          # Build JSON payload
          jq -n \
            --arg context "$CONTEXT" \
            --arg files "$FILES" '{
            model: "deepseek-chat",
            max_tokens: 2000,
            temperature: 0.3,
            messages: [
              {
                role: "system",
                content: "You are a senior code reviewer. Review the FULL source code of changed files (not just the diff). For each issue, ALWAYS include the file path where it occurs. Focus on: bugs, security, performance, error handling, type safety, unused imports/variables, incorrect logic. Be concise. Use markdown bullet points with format: **file/path.ts** - description. If nothing important, say ✅ No significant issues found. IMPORTANT: You have the FULL file contents, not just a diff. Use this to check for unused imports, unused variables, and logic errors that span across changed and unchanged lines."
              },
              {
                role: "user",
                content: ("Files changed:\n" + $files + "\n\nFull file contents:\n" + $context)
              }
            ]
          }' > /tmp/payload.json

          # Call DeepSeek API
          RESPONSE=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d @/tmp/payload.json)

          # Extract comment from response
          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "❌ API error"')

          # Save to file for next step
          echo "$COMMENT" > /tmp/review_comment.txt

      - name: Post comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT=$(cat /tmp/review_comment.txt)

          if [ -n "$COMMENT" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "## 🤖 DeepSeek Code Review

          $COMMENT

          ---
          *Powered by DeepSeek AI*"
          fi
