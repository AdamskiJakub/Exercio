name: DeepSeek Code Review

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: files
        run: |
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- . \
            ':!*.lock' ':!*.toml' \
            ':!*.svg' ':!*.png' ':!*.jpg' ':!*.jpeg' \
            ':!**/node_modules/**' 2>/dev/null || true)

          echo "FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: DeepSeek Code Review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          FILES="${{ steps.files.outputs.FILES }}"

          if [ -z "$FILES" ]; then
            echo "No code changes to review." > /tmp/review_comment.txt
            exit 0
          fi

          # Build context file (avoids shell argument length limits)
          CONTEXT_FILE="/tmp/review_context.txt"
          FILE_LIST_FILE="/tmp/review_filelist.txt"
          > "$CONTEXT_FILE"
          > "$FILE_LIST_FILE"

          FILE_COUNT=0
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "$file" >> "$FILE_LIST_FILE"
              echo "" >> "$CONTEXT_FILE"
              echo "=== $file ===" >> "$CONTEXT_FILE"
              echo '```' >> "$CONTEXT_FILE"
              cat "$file" >> "$CONTEXT_FILE"
              echo '```' >> "$CONTEXT_FILE"
              FILE_COUNT=$((FILE_COUNT + 1))
            fi
          done <<< "$FILES"

          # Build JSON payload using Python (avoids jq "Argument list too long")
          python3 -c "
import json, os

with open('/tmp/review_context.txt', 'r') as f:
    context = f.read()

with open('/tmp/review_filelist.txt', 'r') as f:
    file_list = f.read()

system_prompt = '''You are a senior code reviewer. You have the FULL source code of every changed file. Review EVERY file thoroughly.

For each issue, ALWAYS include the file path and line number. Be specific and actionable.

CHECKLIST (check every item for every file):
1. Unused imports/variables - are there imports or variables declared but never referenced?
2. any type usage - flag any :any or as any - these defeat type safety
3. Dead code - variables assigned but never read, unreachable branches
4. Hardcoded strings that should use i18n - text visible to users should use t() from next-intl
5. Hardcoded locale - e.g. \"pl\" === \"pl\" instead of useLocale()
6. Missing \"use client\" directive - components using hooks need the directive
7. Accessibility issues - missing aria labels, incorrect roles, missing keyboard handlers
8. Error handling - try/catch with empty catch blocks, unhandled promise rejections
9. Performance - unnecessary re-renders, inline functions in props, large useEffect deps
10. Type safety - incorrect types, missing null checks, unsafe casts
11. Code duplication - repeated JSX patterns that could be extracted
12. Logic errors - incorrect conditions, off-by-one, wrong comparison operators

Format: **file/path.ts:line** - description. Be concise but complete.'''

payload = {
    'model': 'deepseek-chat',
    'max_tokens': 8192,
    'temperature': 0.5,
    'messages': [
        {'role': 'system', 'content': system_prompt},
        {'role': 'user', 'content': 'Number of files changed: ' + str($FILE_COUNT) + '\n\nFiles changed:\n' + file_list + '\n\nFull file contents:\n' + context}
    ]
}

with open('/tmp/payload.json', 'w') as f:
    json.dump(payload, f)
"

          echo 'Calling DeepSeek API...'
          RESPONSE=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d @/tmp/payload.json)

          COMMENT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'])" 2>/dev/null || echo "API error")

          ERROR=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',{}).get('message',''))" 2>/dev/null)
          if [ -n "$ERROR" ]; then
            COMMENT="API Error: $ERROR"
          fi

          echo "$COMMENT" > /tmp/review_comment.txt

      - name: Post comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT=$(cat /tmp/review_comment.txt)

          if [ -n "$COMMENT" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "## 🤖 DeepSeek Code Review

          $COMMENT

          ---
          *Powered by DeepSeek AI*"
          fi
