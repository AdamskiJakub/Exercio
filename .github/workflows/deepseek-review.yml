name: DeepSeek Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions: 
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: DeepSeek AI Code Review
        uses: Louis-7/ai-code-review@main
        with:
          openai_api_key: ${{ secrets.DEEPSEEK_API_KEY }}
          openai_api_base: "https://deepseek.com"
          model: "deepseek-coder"
          language: "English"
          exclude: "**/pnpm-lock.yaml,**/node_modules/**,**/*.json,**/*.md"