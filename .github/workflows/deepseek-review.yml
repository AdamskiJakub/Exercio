name: DeepSeek Code Review

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff and call DeepSeek
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # Generate diff between base branch and PR head
          DIFF=$(git diff "origin/${{ github.base_ref }}...HEAD" -- . \
            ':!*.json' ':!*.md' ':!*.lock' ':!*.toml' \
            ':!*.svg' ':!*.png' ':!*.jpg' ':!*.jpeg' \
            ':!**/node_modules/**' 2>/dev/null || true)

          if [ -z "$DIFF" ]; then
            echo "✅ No code changes to review." > /tmp/review_comment.txt
            exit 0
          fi

          # Truncate if too large for DeepSeek context
          if [ ${#DIFF} -gt 60000 ]; then
            DIFF="${DIFF:0:60000}"
          fi

          # Save diff to temp file
          echo "$DIFF" > /tmp/pr_diff.txt

          # Build JSON payload using jq with rawfile to avoid escaping issues
          jq -n --rawfile diff /tmp/pr_diff.txt '{
            model: "deepseek-chat",
            max_tokens: 2000,
            temperature: 0.3,
            messages: [
              {
                role: "system",
                content: "You are a senior code reviewer. Review the git diff and list issues. Focus on: bugs, security, performance, error handling, type safety. Be concise. Use markdown bullet points. If nothing important, say ✅ No significant issues found."
              },
              {
                role: "user",
                content: ("```diff\n" + $diff + "\n```")
              }
            ]
          }' > /tmp/payload.json

          # Call DeepSeek API
          RESPONSE=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d @/tmp/payload.json)

          # Extract comment from response
          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "❌ API error"')

          # Save to file for next step
          echo "$COMMENT" > /tmp/review_comment.txt

      - name: Post comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT=$(cat /tmp/review_comment.txt)

          if [ -n "$COMMENT" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "## 🤖 DeepSeek Code Review

          $COMMENT

          ---
          *Powered by DeepSeek AI*"
          fi
