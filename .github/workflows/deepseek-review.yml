name: DeepSeek Code Review

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: files
        run: |
          FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- . \
            ':!*.lock' ':!*.toml' \
            ':!*.svg' ':!*.png' ':!*.jpg' ':!*.jpeg' \
            ':!**/node_modules/**' 2>/dev/null || true)

          echo "FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Call DeepSeek API
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          FILES="${{ steps.files.outputs.FILES }}"

          if [ -z "$FILES" ]; then
            echo "No code changes to review." > /tmp/review_comment.txt
            exit 0
          fi

          # Build context: for each changed file, include its FULL content
          CONTEXT_FILE="/tmp/review_context.txt"
          FILES_LIST_FILE="/tmp/review_filelist.txt"
          : > "$CONTEXT_FILE"
          : > "$FILES_LIST_FILE"

          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "$file" >> "$FILES_LIST_FILE"
              echo "" >> "$CONTEXT_FILE"
              echo "=== $file ===" >> "$CONTEXT_FILE"
              echo '```' >> "$CONTEXT_FILE"
              cat "$file" >> "$CONTEXT_FILE"
              echo '```' >> "$CONTEXT_FILE"
            fi
          done <<< "$FILES"

          # Build JSON payload using Python (avoids jq "Argument list too long")
          python3 - << 'PYEOF'
import json

with open('/tmp/review_context.txt', 'r') as f:
    context = f.read()

with open('/tmp/review_filelist.txt', 'r') as f:
    files_list = f.read()

payload = {
    "model": "deepseek-chat",
    "max_tokens": 8192,
    "temperature": 0.5,
    "messages": [
        {
            "role": "system",
            "content": "You are a senior code reviewer. Review the FULL source code of changed files (not just the diff). For each issue, ALWAYS include the file path where it occurs. Focus on: bugs, security, performance, error handling, type safety, unused imports/variables, incorrect logic, any type usage, dead code, hardcoded locale, missing use client directive, accessibility issues. Be concise. Use markdown bullet points with format: **file/path.ts** - description. If nothing important, say No significant issues found. IMPORTANT: You have the FULL file contents, not just a diff. Use this to check for unused imports, unused variables, and logic errors that span across changed and unchanged lines."
        },
        {
            "role": "user",
            "content": "Files changed:\n" + files_list + "\n\nFull file contents:\n" + context
        }
    ]
}

with open('/tmp/payload.json', 'w') as f:
    json.dump(payload, f)
PYEOF

          # Call DeepSeek API
          echo 'Calling DeepSeek API...'
          RESPONSE=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d @/tmp/payload.json)

          # Extract comment from response
          COMMENT=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'])" 2>/dev/null || echo "API error")

          ERROR=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',{}).get('message',''))" 2>/dev/null)
          if [ -n "$ERROR" ]; then
            COMMENT="API Error: $ERROR"
          fi

          echo "$COMMENT" > /tmp/review_comment.txt

      - name: Post comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT=$(cat /tmp/review_comment.txt)

          if [ -n "$COMMENT" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "## 🤖 DeepSeek Code Review

          $COMMENT

          ---
          *Powered by DeepSeek AI*"
          fi
